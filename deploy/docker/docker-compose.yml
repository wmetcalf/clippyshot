services:
  postgres:
    # Custom image: postgres:16-alpine + evirma/pg_bktree compiled in,
    # so blastbox's SqlJobStore can create SP-GiST Hamming-distance indexes
    # on perceptual hashes (powers /v1/similar). See postgres/Dockerfile.
    build:
      context: postgres
    image: clippyshot-postgres:dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clippyshot}
      POSTGRES_USER: ${POSTGRES_USER:-clippyshot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clippyshot-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # ClippyShot runs ON blastbox.host: the ingress is `blastbox serve` with
  # ClippyShot's typed-artifact routes + web UI mounted via the ingress
  # extension. The image is clippyshot:dev (engine + LibreOffice) with the
  # `clippyshot[host]` extra installed, so the `blastbox` console script + the
  # host stack (fastapi/psycopg) are on PATH.
  api:
    image: ${CLIPPYSHOT_IMAGE:-clippyshot:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BLASTBOX_DATABASE_URL=postgresql://${POSTGRES_USER:-clippyshot}:${POSTGRES_PASSWORD:-clippyshot-dev}@postgres:5432/${POSTGRES_DB:-clippyshot}
      - BLASTBOX_JOB_ROOT=${CLIPPYSHOT_DATA_DIR:-/var/lib/clippyshot}/jobs
      - BLASTBOX_JOB_RETENTION_SECONDS=${BLASTBOX_JOB_RETENTION_SECONDS:-0}
      - BLASTBOX_ALLOWED_ENGINES=clippyshot
      - BLASTBOX_INGRESS_EXTENSION=clippyshot.blastbox_ingress:make_extension
    ports:
      - "${CLIPPYSHOT_PORT:-8001}:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,exec,nosuid,size=2g
    volumes:
      # Host-CONSISTENT path, NOT a named volume: the dispatcher launches workers
      # whose job-dir bind-mounts are resolved by the host docker daemon on the
      # HOST, so job_root must exist at the SAME path on host + container (a named
      # volume's in-container path doesn't exist on the host -> worker mount fails).
      - ${CLIPPYSHOT_DATA_DIR:-/var/lib/clippyshot}:${CLIPPYSHOT_DATA_DIR:-/var/lib/clippyshot}
    command: ["blastbox", "serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      # HTTP liveness of the ingress (not the pipeline). curl isn't installed,
      # so probe /v1/healthz with the venv python.
      test:
        - "CMD"
        - "/opt/clippyshot/bin/python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/healthz', timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    networks:
      - backend
      - frontend

  # Claims queued jobs and launches one hardened disposable worker per job via
  # `docker run --runtime=runsc …` (runc is REFUSED unless BLASTBOX_ALLOW_RUNC=1).
  # The worker image is the cold-worker overlay (blastbox repo's
  # Dockerfile.clippyshot-cold-worker → `python -m blastbox.worker.cold` with
  # BLASTBOX_ENGINE=clippyshot.engine:ClippyShotEngine baked in). Only this
  # service has the Docker socket.
  dispatcher:
    image: ${CLIPPYSHOT_IMAGE:-clippyshot:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BLASTBOX_DATABASE_URL=postgresql://${POSTGRES_USER:-clippyshot}:${POSTGRES_PASSWORD:-clippyshot-dev}@postgres:5432/${POSTGRES_DB:-clippyshot}
      - BLASTBOX_JOB_ROOT=${CLIPPYSHOT_DATA_DIR:-/var/lib/clippyshot}/jobs
      - BLASTBOX_JOB_RETENTION_SECONDS=${BLASTBOX_JOB_RETENTION_SECONDS:-0}
      # EngineSpec registry: NAME=image:tag. The worker image is built separately
      # from the blastbox repo's Dockerfile.clippyshot-cold-worker (see README).
      - BLASTBOX_ENGINES=clippyshot=${CLIPPYSHOT_WORKER_IMAGE:-clippyshot-cold-worker:dev}
      # Per-engine forwardable-param allowlist (default-deny). Only these client
      # job.params reach the worker as env — ClippyShot's scanner toggles, which the
      # engine re-validates/clamps. Blocks client override of other CLIPPYSHOT_* the
      # worker reads (sandbox selection / insecure-fallback / resource limits).
      - BLASTBOX_ENGINE_CLIPPYSHOT_PARAM_KEYS=${BLASTBOX_ENGINE_CLIPPYSHOT_PARAM_KEYS:-CLIPPYSHOT_OCR,CLIPPYSHOT_OCR_ALL,CLIPPYSHOT_QR,CLIPPYSHOT_OCR_LANG,CLIPPYSHOT_OCR_PSM,CLIPPYSHOT_QR_FORMATS,CLIPPYSHOT_QR_TIMEOUT_S,CLIPPYSHOT_OCR_TIMEOUT_S}
      # Engine-OWNED reserved keys (blastbox core is engine-agnostic; ClippyShot names its
      # own dangerous knobs here). A client must NEVER override these via job.params — they
      # flip the worker's security posture: inner-sandbox selection, insecure-mode fallback,
      # security-internals disclosure, the warm-diag write primitive. Dropped UNCONDITIONALLY
      # (before the allowlist) on every tier; non-empty default = protected even if the
      # allowlist is unset/misconfigured.
      - BLASTBOX_ENGINE_CLIPPYSHOT_RESERVED_KEYS=${BLASTBOX_ENGINE_CLIPPYSHOT_RESERVED_KEYS:-CLIPPYSHOT_WARM_DIAG_FILE,CLIPPYSHOT_SANDBOX,CLIPPYSHOT_WARN_ON_INSECURE,CLIPPYSHOT_DISCLOSE_SECURITY_INTERNALS}
      # Concurrency: empty = 1 dispatch loop. Set to fan out claim+launch.
      - BLASTBOX_DISPATCH_CONCURRENCY=${BLASTBOX_DISPATCH_CONCURRENCY:-}
      - BLASTBOX_WORKER_TIMEOUT_S=${BLASTBOX_WORKER_TIMEOUT_S:-300}
      # Worker runtime: empty = auto-detect (prefer runsc). Plain runc is
      # fail-closed REFUSED unless BLASTBOX_ALLOW_RUNC=1;
      # BLASTBOX_REQUIRE_SECURE_RUNTIME=1 is a hard lockdown (never runc).
      - BLASTBOX_WORKER_RUNTIME=${BLASTBOX_WORKER_RUNTIME:-}
      - BLASTBOX_ALLOW_RUNC=${BLASTBOX_ALLOW_RUNC:-0}
      - BLASTBOX_REQUIRE_SECURE_RUNTIME=${BLASTBOX_REQUIRE_SECURE_RUNTIME:-0}
      # Per-worker resource caps. Empty = auto-size to host CPU + memory.
      - BLASTBOX_WORKER_MEMORY=${BLASTBOX_WORKER_MEMORY:-}
      - BLASTBOX_WORKER_PIDS_LIMIT=${BLASTBOX_WORKER_PIDS_LIMIT:-}
      - BLASTBOX_WORKER_CPUS=${BLASTBOX_WORKER_CPUS:-}
      - BLASTBOX_WORKER_NOFILE=${BLASTBOX_WORKER_NOFILE:-4096}
      # Path on the HOST filesystem to a Docker seccomp profile, attached to each
      # worker via --security-opt=seccomp=. The image ships one at
      # /etc/clippyshot/seccomp.json (copy it to the host and point here).
      - BLASTBOX_SECCOMP_JSON_HOST=${BLASTBOX_SECCOMP_JSON_HOST:-}
      # Comma-separated AppArmor profile names loaded on the host.
      - BLASTBOX_APPARMOR_PROFILES=${BLASTBOX_APPARMOR_PROFILES:-}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    group_add:
      - "${DOCKER_GID:-984}"
    tmpfs:
      # Pure cold dispatcher — no warm scratch here (FC warm runs in the dispatcher-fc
      # sidecar with its own large /tmp; gVisor in dispatcher-gvisor). Keep this minimal.
      - /tmp:rw,nosuid,size=64m
    volumes:
      # Host-CONSISTENT path, NOT a named volume: the dispatcher launches workers
      # whose job-dir bind-mounts are resolved by the host docker daemon on the
      # HOST, so job_root must exist at the SAME path on host + container (a named
      # volume's in-container path doesn't exist on the host -> worker mount fails).
      - ${CLIPPYSHOT_DATA_DIR:-/var/lib/clippyshot}:${CLIPPYSHOT_DATA_DIR:-/var/lib/clippyshot}
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["blastbox", "dispatch"]
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    networks:
      - backend

networks:
  backend:
    internal: true
  frontend:

volumes:
  postgres-data:
  # clippyshot-data removed: job_root is a host bind-mount (see api/dispatcher),
  # required so dispatcher-launched workers can bind-mount job dirs by host path.
